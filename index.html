<!DOCTYPE html>

<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="icon" type="image/x-icon" href="src/icon.png">
    <title>Sigma.js Graph</title>
</head>

<body>
    <div id="controls">
        <select id="graph-selector">
            <option value="" disabled selected>Loading list...</option>
        </select>

        <select id="algorithm-selector">
            <option value="" disabled selected>Loading list...</option>
        </select>

        <div class="theme-toggle" role="group" aria-label="Переключение темы">
            <input type="checkbox" id="theme-switch" class="theme-checkbox"/>
            <label for="theme-switch" class="theme-slider">
                <span class="theme-icon icon-dark">🌙</span>
                <span class="theme-icon icon-light">☀️</span>
            </label>
        </div>
    </div>

    <div id="sigma-container"></div>

    <div id="loader" style="display: none;">
        <div class="spinner"></div>
        <span id="loader-status"></span>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
